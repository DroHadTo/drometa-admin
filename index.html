<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DroMeta Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --border: #2a2a2a;
      --accent: #c9a87c;
      --accent2: #b8935f;
      --text: #f0f0f0;
      --muted: #888;
      --danger: #ff4d4d;
      --success: #4dff91;
      --warning: #ffd54d;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ГўВ”ВЂГўВ”ВЂ LOGIN ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .login-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo span {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .login-logo span em {
      color: var(--accent);
      font-style: normal;
    }

    .login-logo p {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus {
      border-color: var(--accent);
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-login:hover { background: var(--accent2); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-error {
      color: var(--danger);
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      min-height: 18px;
    }

    /* ГўВ”ВЂГўВ”ВЂ DASHBOARD ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    #dashboard { display: none; }

    .topbar {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-logo {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .topbar-logo em {
      color: var(--accent);
      font-style: normal;
    }

    .topbar-logo span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
      margin-left: 8px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-user {
      font-size: 13px;
      color: var(--muted);
    }

    .btn-logout {
      padding: 7px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-logout:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    .main {
      padding: 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ГўВ”ВЂГўВ”ВЂ STATS ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }

    .stat-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .stat-value.accent { color: var(--accent); }
    .stat-value.warning { color: var(--warning); }
    .stat-value.success { color: var(--success); }
    .stat-value.muted { color: var(--muted); }

    /* ГўВ”ВЂГўВ”ВЂ FILTERS ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      align-items: center;
    }

    .filter-select {
      padding: 8px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .filter-select:focus { border-color: var(--accent); }

    .btn-refresh {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      margin-left: auto;
    }

    .btn-refresh:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .results-count {
      font-size: 13px;
      color: var(--muted);
    }

    /* ГўВ”ВЂГўВ”ВЂ TABLE ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    .table-wrap {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead tr {
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: 12px 16px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      cursor: pointer;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg3); }
    tbody tr.row-new { border-left: 3px solid var(--accent); }

    td {
      padding: 14px 16px;
      vertical-align: top;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    td.message-cell {
      max-width: 280px;
      color: var(--muted);
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge-new { background: rgba(200,240,60,0.15); color: var(--accent); }
    .badge-reviewed { background: rgba(77,255,145,0.1); color: var(--success); }
    .badge-archived { background: rgba(136,136,136,0.15); color: var(--muted); }

    .source-tag {
      font-size: 11px;
      color: var(--muted);
      background: var(--bg3);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .date-cell { color: var(--muted); font-size: 12px; }

    /* ГўВ”ВЂГўВ”ВЂ MODAL ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-header {
      padding: 24px 28px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg2);
    }

    .modal-name { font-size: 18px; font-weight: 700; }
    .modal-email { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
    }

    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 24px 28px; }

    .modal-row {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 8px;
      margin-bottom: 14px;
      align-items: start;
    }

    .modal-key {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding-top: 2px;
    }

    .modal-val { font-size: 14px; word-break: break-word; }

    .modal-message {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      padding: 16px 28px 24px;
      border-top: 1px solid var(--border);
    }

    .btn-action {
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      transition: all 0.2s;
    }

    .btn-action:hover { border-color: var(--accent); color: var(--accent); }

    .btn-action.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    /* ГўВ”ВЂГўВ”ВЂ EMPTY / LOADING ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ */
    .empty-state {
      text-align: center;
      padding: 64px 32px;
      color: var(--muted);
    }

    .empty-state p { font-size: 15px; }

    .loading-row td {
      text-align: center;
      padding: 48px;
      color: var(--muted);
    }
  </style>
</head>
<body>

<!-- ГўВ”ВЂГўВ”ВЂ LOGIN SCREEN ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div><span>Dro<em>Meta</em></span></div>
      <p>Admin Dashboard</p>
    </div>
    <form id="login-form">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="DroMeta" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="ГўВЂВўГўВЂВўГўВЂВўГўВЂВўГўВЂВўГўВЂВўГўВЂВўГўВЂВўГўВЂВўГўВЂВў" autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login" id="login-btn">Sign In</button>
      <div class="login-error" id="login-error"></div>
    </form>
  </div>
</div>

<!-- ГўВ”ВЂГўВ”ВЂ DASHBOARD ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ -->
<div id="dashboard">
  <nav class="topbar">
    <div class="topbar-logo">
      Dro<em>Meta</em><span>Admin</span>
    </div>
    <div class="topbar-right">
      <span class="topbar-user" id="topbar-user"></span>
      <button class="btn-logout" id="logout-btn">Sign Out</button>
    </div>
  </nav>

  <main class="main">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Leads</div>
        <div class="stat-value accent" id="stat-total">ГўВЂВ”</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">New</div>
        <div class="stat-value warning" id="stat-new">ГўВЂВ”</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Reviewed</div>
        <div class="stat-value success" id="stat-reviewed">ГўВЂВ”</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Archived</div>
        <div class="stat-value muted" id="stat-archived">ГўВЂВ”</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Homepage</div>

<script>
(function () {
  // ГўВ”ВЂГўВ”ВЂ Supabase setup ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  const SB_URL = 'https://ylpgiwyowbkvralcesfl.supabase.co';
  const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlscGdpd3lvd2JrdnJhbGNlc2ZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3ODAxMzQsImV4cCI6MjA5MDM1NjEzNH0.s1iGsl-NXgB7_5d6J8O27419nbUheaajjm7jwQ4C-Bk';
  const { createClient } = window.supabase;

  // ГўВ”ВЂГўВ”ВЂ State ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  let allSubmissions = [];
  let currentRow = null;

  // ГўВ”ВЂГўВ”ВЂ Elements ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  const loginScreen = document.getElementById('login-screen');
  const dashboard   = document.getElementById('dashboard');
  const loginForm   = document.getElementById('login-form');
  const loginBtn    = document.getElementById('login-btn');
  const loginError  = document.getElementById('login-error');
  const usernameEl  = document.getElementById('username');
  const passwordEl  = document.getElementById('password');
  const logoutBtn   = document.getElementById('logout-btn');
  const topbarUser  = document.getElementById('topbar-user');
  const tbody       = document.getElementById('submissions-body');
  const overlay     = document.getElementById('modal-overlay');
  const modalClose  = document.getElementById('modal-close');
  const refreshBtn  = document.getElementById('refresh-btn');

  // ГўВ”ВЂГўВ”ВЂ Auth state ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  sb.auth.onAuthStateChange((_event, session) => {
    if (session) {
      showDashboard(session.user);
    } else {
      showLogin();
    }
  });

  // ГўВ”ВЂГўВ”ВЂ Login ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    loginError.textContent = '';
    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in...';

    const username = usernameEl.value.trim();
    const password = passwordEl.value;
    const email = USER_MAP[username] || username;

    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      loginError.textContent = 'Invalid username or password.';
      loginBtn.disabled = false;
      loginBtn.textContent = 'Sign In';
    }
  });

  // ГўВ”ВЂГўВ”ВЂ Logout ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  logoutBtn.addEventListener('click', () => sb.auth.signOut());

  // ГўВ”ВЂГўВ”ВЂ Show/hide screens ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  function showLogin() {
    loginScreen.style.display = 'flex';
    dashboard.style.display = 'none';
    loginBtn.disabled = false;
    loginBtn.textContent = 'Sign In';
    passwordEl.value = '';
  }

  function showDashboard(user) {
    loginScreen.style.display = 'none';
    dashboard.style.display = 'block';
    const username = Object.keys(USER_MAP).find(k => USER_MAP[k] === user.email) || user.email;
    topbarUser.textContent = username;
    loadSubmissions();
  }

  // ГўВ”ВЂГўВ”ВЂ Load data ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  async function loadSubmissions() {
    tbody.innerHTML = '<tr class="loading-row"><td colspan="8">Loading...</td></tr>';

    const { data, error } = await sb
      .from('form_submissions')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      tbody.innerHTML = `<tr class="loading-row"><td colspan="8">Error: ${error.message}</td></tr>`;
      return;
    }

    allSubmissions = data || [];
    updateStats(allSubmissions);
    applyFilters();
  }

  // ГўВ”ВЂГўВ”ВЂ Stats ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  function updateStats(rows) {
    document.getElementById('stat-total').textContent    = rows.length;
    document.getElementById('stat-new').textContent      = rows.filter(r => r.status === 'new').length;
    document.getElementById('stat-reviewed').textContent = rows.filter(r => r.status === 'reviewed').length;
    document.getElementById('stat-archived').textContent = rows.filter(r => r.status === 'archived').length;
    document.getElementById('stat-homepage').textContent = rows.filter(r => r.source === 'homepage').length;
    document.getElementById('stat-contact').textContent  = rows.filter(r => r.source === 'contact-page').length;
  }

  // ГўВ”ВЂГўВ”ВЂ Filters ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  function applyFilters() {
    const status = document.getElementById('filter-status').value;
    const source = document.getElementById('filter-source').value;
    const type   = document.getElementById('filter-type').value;

    let rows = allSubmissions.filter(r => {
      if (status && r.status !== status) return false;
      if (source && r.source !== source) return false;
      if (type && r.inquiry_type !== type) return false;
      return true;
    });

    document.getElementById('results-count').textContent = `${rows.length} result${rows.length !== 1 ? 's' : ''}`;
    renderTable(rows);
  }

  ['filter-status', 'filter-source', 'filter-type'].forEach(id => {
    document.getElementById(id).addEventListener('change', applyFilters);
  });

  refreshBtn.addEventListener('click', loadSubmissions);

  // ГўВ”ВЂГўВ”ВЂ Render table ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  function renderTable(rows) {
    if (!rows.length) {
      tbody.innerHTML = '<tr class="loading-row"><td colspan="8">No submissions found.</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(r => {
      const isNew = r.status === 'new';
      const date  = r.created_at ? new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : 'ГўВЂВ”';
      const msg   = (r.message || '').replace(/</g, '&lt;').substring(0, 80) + ((r.message || '').length > 80 ? '...' : '');
      return `
        <tr class="${isNew ? 'row-new' : ''}" data-id="${r.id}">
          <td>${badgeHtml(r.status)}</td>
          <td><strong>${esc(r.name)}</strong></td>
          <td>${esc(r.email)}</td>
          <td>${r.x_handle ? '@' + esc(r.x_handle.replace(/^@/, '')) : '<span style="color:var(--muted)">ГўВЂВ”</span>'}</td>
          <td>${r.inquiry_type ? esc(r.inquiry_type) : '<span style="color:var(--muted)">ГўВЂВ”</span>'}</td>
          <td class="message-cell">${msg || '<span style="color:var(--muted)">ГўВЂВ”</span>'}</td>
          <td><span class="source-tag">${esc(r.source || 'ГўВЂВ”')}</span></td>
          <td class="date-cell">${date}</td>
        </tr>`;
    }).join('');

    // Row click ГўВ†В’ open modal
    tbody.querySelectorAll('tr[data-id]').forEach(tr => {
      tr.addEventListener('click', () => {
        const row = allSubmissions.find(r => r.id === tr.dataset.id);
        if (row) openModal(row);
      });
    });
  }

  function badgeHtml(status) {
    const map = { new: 'badge-new', reviewed: 'badge-reviewed', archived: 'badge-archived' };
    return `<span class="badge ${map[status] || 'badge-archived'}">${status || 'unknown'}</span>`;
  }

  function esc(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ГўВ”ВЂГўВ”ВЂ Modal ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  function openModal(row) {
    currentRow = row;
    document.getElementById('modal-name').textContent    = row.name || 'ГўВЂВ”';
    document.getElementById('modal-email').textContent   = row.email || 'ГўВЂВ”';
    document.getElementById('modal-x').textContent       = row.x_handle ? '@' + row.x_handle.replace(/^@/, '') : 'ГўВЂВ”';
    document.getElementById('modal-tg').textContent      = row.telegram || 'ГўВЂВ”';
    document.getElementById('modal-type').textContent    = row.inquiry_type || 'ГўВЂВ”';
    document.getElementById('modal-source').textContent  = row.source || 'ГўВЂВ”';
    document.getElementById('modal-message').textContent = row.message || 'ГўВЂВ”';

    const date = row.created_at
      ? new Date(row.created_at).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' })
      : 'ГўВЂВ”';
    document.getElementById('modal-date').textContent = date;

    // Highlight active status button
    ['new','reviewed','archived'].forEach(s => {
      const btn = document.getElementById('btn-' + s);
      btn.classList.toggle('active', row.status === s);
    });

    overlay.classList.add('open');
  }

  function closeModal() {
    overlay.classList.remove('open');
    currentRow = null;
  }

  modalClose.addEventListener('click', closeModal);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

  // ГўВ”ВЂГўВ”ВЂ Status update ГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂГўВ”ВЂ
  document.querySelectorAll('.btn-action').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!currentRow) return;
      const newStatus = btn.dataset.status;
      btn.textContent = 'SavingГўВЂВ¦';

      const { error } = await sb
        .from('form_submissions')
        .update({ status: newStatus })
        .eq('id', currentRow.id);

      if (!error) {
        currentRow.status = newStatus;
        // Update in allSubmissions array
        const idx = allSubmissions.findIndex(r => r.id === currentRow.id);
        if (idx >= 0) allSubmissions[idx].status = newStatus;
        updateStats(allSubmissions);
        applyFilters();
        // Refresh button states
        ['new','reviewed','archived'].forEach(s => {
          const b = document.getElementById('btn-' + s);
          b.classList.toggle('active', s === newStatus);
          b.textContent = s === 'new' ? 'Mark New' : s === 'reviewed' ? 'Mark Reviewed' : 'Archive';
        });
      } else {
        btn.textContent = btn.dataset.status === 'new' ? 'Mark New' : btn.dataset.status === 'reviewed' ? 'Mark Reviewed' : 'Archive';
        alert('Update failed: ' + error.message);
      }
    });
  });

})();
</script>
</body>
